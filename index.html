<style>
  :root{
    --obsidian:#0B1114;
    --ink:#1A2230;
    --slate:#5B6675;
    --mist:#E7ECF2;
    --white:#FFFFFF;
    --forge-deep:#9E3400;
    --forge-mid:#FF6F00;
    --forge-bright:#FFA62B;
    --forge-grad:linear-gradient(180deg,var(--forge-deep) 0%,var(--forge-mid) 50%,var(--forge-bright) 100%);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}

  body{
    background:var(--obsidian);
    color:var(--mist);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* atmosphere: faint engineering grid + warm core glow */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(to right,rgba(231,236,242,0.035) 1px,transparent 1px),
      linear-gradient(to bottom,rgba(231,236,242,0.035) 1px,transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 42%,#000 30%,transparent 78%);
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 42%,#000 30%,transparent 78%);
    pointer-events:none;
  }
  body::after{
    content:"";
    position:absolute;
    width:760px;height:760px;
    top:32%;left:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(255,111,0,0.16) 0%,rgba(255,111,0,0.05) 38%,transparent 68%);
    filter:blur(8px);
    pointer-events:none;
  }

  main{
    position:relative;
    z-index:1;
    width:min(680px,90vw);
    text-align:center;
    padding:48px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .mark{
    width:132px;height:132px;
    margin-bottom:38px;
    filter:drop-shadow(0 6px 28px rgba(255,111,0,0.32));
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .05s forwards;
  }
  .mark svg{width:100%;height:100%;display:block}

  .wordmark{
    font-family:"Michroma",sans-serif;
    font-size:clamp(30px,7vw,52px);
    letter-spacing:.04em;
    color:var(--white);
    line-height:1;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .18s forwards;
  }

  .tagline{
    font-family:"Michroma",sans-serif;
    font-size:clamp(10px,2.1vw,13px);
    letter-spacing:.34em;
    text-transform:uppercase;
    margin-top:20px;
    background:var(--forge-grad);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .3s forwards;
  }

  .rule{
    width:0;height:1px;margin:34px 0 26px;
    background:linear-gradient(90deg,transparent,var(--forge-mid),transparent);
    animation:grow 1s cubic-bezier(.2,.7,.2,1) .46s forwards;
  }

  .status{
    font-size:clamp(11px,2vw,13px);
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--slate);
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .56s forwards;
  }
  .status .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--forge-mid);margin-right:12px;vertical-align:middle;
    box-shadow:0 0 0 0 rgba(255,111,0,.55);
    animation:pulse 2.4s ease-out infinite;
  }

  .descriptor{
    max-width:460px;
    margin-top:22px;
    font-size:clamp(14px,2.4vw,16px);
    font-weight:300;
    line-height:1.6;
    color:var(--mist);
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .66s forwards;
  }

  .cta{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:40px;
    padding:14px 28px;
    border:1px solid rgba(255,111,0,.45);
    border-radius:2px;
    font-family:"IBM Plex Sans",sans-serif;
    font-size:13px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;
    color:var(--forge-bright);
    text-decoration:none;
    background:rgba(255,111,0,.04);
    transition:background .35s ease,border-color .35s ease,color .35s ease,transform .35s ease;
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .78s forwards;
  }
  .cta:hover{
    background:var(--forge-grad);
    border-color:transparent;
    color:var(--obsidian);
    transform:translateY(-2px);
  }
  .cta svg{width:15px;height:15px}

  .parent{
    margin-top:54px;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--slate);
    opacity:0;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .9s forwards;
  }
  .parent a{color:var(--mist);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .3s ease}
  .parent a:hover{border-color:var(--forge-mid)}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes grow{from{width:0}to{width:180px}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,111,0,.5)}70%{box-shadow:0 0 0 9px rgba(255,111,0,0)}100%{box-shadow:0 0 0 0 rgba(255,111,0,0)}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    .mark,.wordmark,.tagline,.status,.descriptor,.cta,.parent{opacity:1}
    .rule{width:180px}
  }
</style>
